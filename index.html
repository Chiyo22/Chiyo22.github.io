<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ページタイトル</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #f7f7f7;
      color: #333;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 24px;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 32px;
      font-weight: 700;
    }

    p {
      font-size: 1rem;
      line-height: 1.8;
      text-align: left;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>ここに題名を入れます</h1>

    <p>
      ここに文章を書きます。サイトの中央に配置され、
      読みやすい幅で表示されるようになっています。
      文章が長くなっても自然に下へ続きます。
    </p>
  </main>
</body>
</html>
